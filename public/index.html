<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StreamVault — Multi-Server Player</title>
  <meta name="description" content="Premium multi-server video player with quality selection and downloads" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a28;
      --bg-elevated: #222236;
      --accent: #7c5cfc;
      --accent-hover: #6a4aee;
      --accent-glow: rgba(124, 92, 252, 0.25);
      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.15);
      --red: #f87171;
      --red-dim: rgba(248, 113, 113, 0.15);
      --amber: #fbbf24;
      --amber-dim: rgba(251, 191, 36, 0.15);
      --text-primary: #e8e8f0;
      --text-secondary: #8888a8;
      --text-muted: #55556a;
      --border: #2a2a3e;
      --radius: 12px;
      --radius-sm: 8px;
      --font: 'Inter', -apple-system, sans-serif;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient glow behind player */
    .ambient-glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .header-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header h1 span { color: var(--accent); }

    /* Search bar */
    .search-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-row select,
    .search-row input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row select:focus,
    .search-row input:focus {
      border-color: var(--accent);
    }
    .search-row input { flex: 1; min-width: 200px; }
    .search-row select { min-width: 110px; }
    .tv-inputs {
      display: none;
      gap: 8px;
    }
    .tv-inputs input { width: 80px; min-width: 60px; flex: 0; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6a4aee);
      border: none;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Server tabs */
    .server-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .server-tab {
      flex: 1;
      min-width: 120px;
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }
    .server-tab:hover { border-color: var(--text-muted); }
    .server-tab.loading {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--amber-dim);
    }
    .server-tab.ready {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-dim);
    }
    .server-tab.failed {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-dim);
      cursor: not-allowed;
      opacity: 0.6;
    }
    .server-tab.active {
      background: linear-gradient(135deg, var(--accent), #6a4aee);
      border-color: var(--accent);
      color: #fff;
    }
    .server-tab .tab-label { display: block; font-size: 13px; }
    .server-tab .tab-status { display: block; font-size: 10px; margin-top: 2px; opacity: 0.8; }

    /* Status bar */
    #status {
      padding: 8px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--amber);
      min-height: 28px;
    }

    /* ========= CUSTOM VIDEO PLAYER ========= */
    .player-wrapper {
      position: relative;
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      aspect-ratio: 16 / 9;
      margin-bottom: 20px;
      display: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .player-wrapper.visible { display: block; }
    .player-wrapper video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* Controls overlay */
    .controls-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 40px 16px 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .player-wrapper:hover .controls-overlay,
    .player-wrapper.paused .controls-overlay { opacity: 1; }

    /* Progress bar */
    .progress-container {
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      cursor: pointer;
      margin-bottom: 10px;
      position: relative;
    }
    .progress-container:hover { height: 7px; }
    .progress-buffered {
      position: absolute;
      height: 100%;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }
    .progress-bar {
      position: absolute;
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.1s linear;
    }
    .progress-bar::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%) scale(0);
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s;
    }
    .progress-container:hover .progress-bar::after { transform: translateY(-50%) scale(1); }

    /* Control buttons row */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      display: flex;
      align-items: center;
      opacity: 0.9;
      transition: opacity 0.15s, transform 0.15s;
    }
    .ctrl-btn:hover { opacity: 1; transform: scale(1.1); }
    .ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }

    .time-display {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      font-variant-numeric: tabular-nums;
      user-select: none;
    }
    .spacer { flex: 1; }

    /* Volume slider */
    .volume-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .volume-slider {
      width: 0;
      transition: width 0.2s;
      overflow: hidden;
    }
    .volume-group:hover .volume-slider { width: 80px; }
    .volume-slider input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      outline: none;
    }
    .volume-slider input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }

    /* Quality & download dropdown */
    .dropdown-wrapper {
      position: relative;
    }
    .dropdown-menu {
      position: absolute;
      bottom: 36px;
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      min-width: 180px;
      padding: 6px 0;
      display: none;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .dropdown-menu.open { display: block; }
    .dropdown-menu .menu-title {
      padding: 8px 14px 4px;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .dropdown-menu .menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.1s;
      text-decoration: none;
    }
    .dropdown-menu .menu-item:hover { background: rgba(255,255,255,0.06); }
    .dropdown-menu .menu-item.active { color: var(--accent); }
    .dropdown-menu .menu-item .check {
      width: 14px;
      text-align: center;
      font-size: 11px;
    }
    .dropdown-menu .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* Big center play button */
    .center-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(124, 92, 252, 0.85);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, transform 0.15s;
      pointer-events: none;
    }
    .center-play svg { width: 28px; height: 28px; fill: #fff; margin-left: 3px; }
    .player-wrapper.paused .center-play { opacity: 1; pointer-events: auto; }
    .center-play:hover { transform: translate(-50%, -50%) scale(1.08); }

    /* Download panel */
    .download-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      display: none;
    }
    .download-panel.visible { display: block; }
    .download-panel h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .download-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .download-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s;
    }
    .download-link:hover { border-color: var(--accent); background: rgba(124,92,252,0.08); }
    .download-link .dl-quality { font-weight: 700; }
    .download-link .dl-icon { font-size: 16px; opacity: 0.6; }

    /* Advanced settings toggle */
    .advanced-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 12px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }
    .advanced-toggle:hover { border-color: var(--text-muted); color: var(--text-primary); }
    .advanced-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
      display: none;
    }
    .advanced-panel.open { display: block; }
    .advanced-panel h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .advanced-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .advanced-grid select {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      outline: none;
      flex: 1;
      min-width: 140px;
    }
    .advanced-grid label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 640px) {
      .app { padding: 16px 12px; }
      .server-tabs { gap: 6px; }
      .server-tab { min-width: 80px; padding: 8px 6px; font-size: 11px; }
      .controls-row { gap: 8px; }
    }
  </style>
</head>
<body>

<div class="ambient-glow"></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-icon">▶</div>
    <h1>Stream<span>Vault</span></h1>
  </div>

  <!-- Search -->
  <div class="search-row">
    <select id="mediaType">
      <option value="movie">Movie</option>
      <option value="tv">TV Series</option>
    </select>
    <input id="tmdbId" placeholder="Enter TMDB ID (e.g. 533535)" />
    <div id="tvInputs" class="tv-inputs">
      <input id="season" type="number" min="1" placeholder="S" />
      <input id="episode" type="number" min="1" placeholder="E" />
    </div>
    <button class="btn-primary" id="extractAndPlay">⚡ Fetch All</button>
    <button class="advanced-toggle" id="advToggle">⚙ Advanced</button>
  </div>

  <!-- Advanced Nxsha settings -->
  <div class="advanced-panel" id="advPanel">
    <h3>Nxsha Advanced Options</h3>
    <div class="advanced-grid">
      <select id="advServer">
        <option value="">Default Server</option>
        <option value="MbPly-[Multi-Lang]">MbPly-[Multi-Lang]</option>
        <option value="ZetPly">ZetPly</option>
        <option value="OrVid">OrVid</option>
      </select>
      <select id="advLang">
        <option value="">Default Language</option>
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
      </select>
      <select id="advSub">
        <option value="">No Subtitles</option>
        <option value="en">English Subs</option>
        <option value="hi">Hindi Subs</option>
      </select>
      <label><input type="checkbox" id="advOneServer" /> Strict Lock</label>
    </div>
  </div>

  <!-- Server tabs -->
  <div class="server-tabs" id="tabs">
    <div class="server-tab" id="tab-vidsrc" data-server="vidsrc">
      <span class="tab-label">VidSrc</span>
      <span class="tab-status">—</span>
    </div>
    <div class="server-tab" id="tab-cinema" data-server="cinema">
      <span class="tab-label">Cinema</span>
      <span class="tab-status">—</span>
    </div>
    <div class="server-tab" id="tab-vidlink" data-server="vidlink">
      <span class="tab-label">VidLink</span>
      <span class="tab-status">—</span>
    </div>
    <div class="server-tab" id="tab-nxsha" data-server="nxsha">
      <span class="tab-label">Nxsha</span>
      <span class="tab-status">—</span>
    </div>
    <div class="server-tab" id="tab-fmovies" data-server="fmovies">
      <span class="tab-label">Fmovies</span>
      <span class="tab-status">—</span>
    </div>
  </div>

  <div id="status"></div>

  <!-- Custom Player -->
  <div class="player-wrapper" id="playerWrapper">
    <video id="video" playsinline></video>

    <!-- Center play -->
    <button class="center-play" id="centerPlay">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <!-- Controls -->
    <div class="controls-overlay" id="controlsOverlay">
      <!-- Progress -->
      <div class="progress-container" id="progressContainer">
        <div class="progress-buffered" id="progressBuffered"></div>
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="controls-row">
        <!-- Play/Pause -->
        <button class="ctrl-btn" id="btnPlay" title="Play/Pause">
          <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <!-- Skip back -->
        <button class="ctrl-btn" id="btnSkipBack" title="-10s">
          <svg viewBox="0 0 24 24"><path d="M12.5 8c-3.6 0-6.5 2.9-6.5 6.5S8.9 21 12.5 21s6.5-2.9 6.5-6.5h-2c0 2.5-2 4.5-4.5 4.5S8 17 8 14.5 10 10 12.5 10V8z"/><path d="M10 5l4 3-4 3V5z" transform="scale(-1,1) translate(-24,0)"/></svg>
        </button>

        <!-- Skip forward -->
        <button class="ctrl-btn" id="btnSkipFwd" title="+10s">
          <svg viewBox="0 0 24 24"><path d="M11.5 8c3.6 0 6.5 2.9 6.5 6.5S15.1 21 11.5 21 5 18.1 5 14.5h2c0 2.5 2 4.5 4.5 4.5S16 17 16 14.5 14 10 11.5 10V8z"/><path d="M14 5l-4 3 4 3V5z" transform="scale(-1,1) translate(-24,0)"/></svg>
        </button>

        <!-- Time -->
        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>

        <span class="spacer"></span>

        <!-- Volume -->
        <div class="volume-group">
          <button class="ctrl-btn" id="btnMute" title="Mute">
            <svg id="iconVol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.8-1-3.3-2.5-4v8c1.5-.7 2.5-2.2 2.5-4z"/></svg>
            <svg id="iconMute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.8-1-3.3-2.5-4v2.2l2.5 2.5V12zM19 12c0 .9-.2 1.8-.5 2.5l1.5 1.5c.5-1.2.8-2.6.8-4 0-4.3-3-7.8-7-8.7v2C16.4 6.2 19 8.8 19 12zM4.3 3L3 4.3 7.7 9H3v6h4l5 5v-6.7l4.2 4.2c-.7.5-1.4.9-2.2 1.1v2c1.3-.3 2.5-.9 3.5-1.7l1.2 1.2L20.3 19l1.4-1.4L4.3 3zM12 4l-2.1 2.1L12 8.3V4z"/></svg>
          </button>
          <div class="volume-slider">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" />
          </div>
        </div>

        <!-- Quality dropdown -->
        <div class="dropdown-wrapper">
          <button class="ctrl-btn" id="btnQuality" title="Quality">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8 12H9.5v-2h-2v2H6V9h1.5v2.5h2V9H11v6zm7-1c0 .55-.45 1-1 1h-.75v1.5h-1.5V15H14c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1h3c.55 0 1 .45 1 1v4zm-3.5-.5h2v-3h-2v3z"/></svg>
          </button>
          <div class="dropdown-menu" id="qualityMenu">
            <div class="menu-title">Quality</div>
            <div id="qualityList"></div>
          </div>
        </div>

        <!-- Download dropdown -->
        <div class="dropdown-wrapper">
          <button class="ctrl-btn" id="btnDownload" title="Download">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </button>
          <div class="dropdown-menu" id="downloadMenu">
            <div class="menu-title">Download</div>
            <div id="downloadList"></div>
          </div>
        </div>

        <!-- Fullscreen -->
        <button class="ctrl-btn" id="btnFullscreen" title="Fullscreen">
          <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Download panel below player -->
  <div class="download-panel" id="downloadPanel">
    <h3>⬇ Download Links</h3>
    <div class="download-grid" id="downloadGrid"></div>
  </div>
</div>

<script>
  // Anti-bot
  window.API_KEY_PAYLOAD = 'vidsrc-secure-key-2026';
  const isBot = navigator.webdriver ||
                !!window.cdc_adoQpoasnfa76pfcZLmcfl_Array ||
                (navigator.languages && navigator.languages.length === 0);
  if (isBot) window.API_KEY_PAYLOAD = 'corrupted-bot-key';

  // DOM refs
  const video = document.getElementById('video');
  const statusDiv = document.getElementById('status');
  const extractBtn = document.getElementById('extractAndPlay');
  const playerWrapper = document.getElementById('playerWrapper');
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');
  const progressBuffered = document.getElementById('progressBuffered');
  const timeDisplay = document.getElementById('timeDisplay');
  const qualityMenu = document.getElementById('qualityMenu');
  const qualityList = document.getElementById('qualityList');
  const downloadMenu = document.getElementById('downloadMenu');
  const downloadList = document.getElementById('downloadList');
  const downloadPanel = document.getElementById('downloadPanel');
  const downloadGrid = document.getElementById('downloadGrid');
  const volumeSlider = document.getElementById('volumeSlider');
  const tabs = document.querySelectorAll('.server-tab');

  let hls = null;
  let activeServer = null;
  let serverStreams = {};
  let retryCounts = {};
  let currentQuality = -1; // -1 = auto

  const ENCRYPTION_KEY = 'vidsrc_super_secret_key_12345678';

  function decryptURL(encryptedData) {
    try {
      const parts = encryptedData.split(':');
      const key = CryptoJS.enc.Utf8.parse(ENCRYPTION_KEY);
      const iv = CryptoJS.enc.Hex.parse(parts[0]);
      const cp = CryptoJS.lib.CipherParams.create({ ciphertext: CryptoJS.enc.Hex.parse(parts[1]) });
      return CryptoJS.AES.decrypt(cp, key, { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }).toString(CryptoJS.enc.Utf8);
    } catch (e) { return null; }
  }

  // Tab clicks
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const server = tab.getAttribute('data-server');
      if (server && serverStreams[server]) {
        activeServer = null; // reset so playStream doesn't skip
        playStream(server, serverStreams[server]);
      }
    });
  });

  // ========= PLAYER CONTROLS =========

  function fmt(s) {
    if (!s || !isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  // Play/pause
  document.getElementById('btnPlay').addEventListener('click', togglePlay);
  document.getElementById('centerPlay').addEventListener('click', togglePlay);
  video.addEventListener('click', togglePlay);

  function togglePlay() {
    if (video.paused) video.play(); else video.pause();
  }

  video.addEventListener('play', () => {
    playerWrapper.classList.remove('paused');
    document.getElementById('iconPlay').style.display = 'none';
    document.getElementById('iconPause').style.display = '';
  });
  video.addEventListener('pause', () => {
    playerWrapper.classList.add('paused');
    document.getElementById('iconPlay').style.display = '';
    document.getElementById('iconPause').style.display = 'none';
  });

  // Time update
  video.addEventListener('timeupdate', () => {
    if (video.duration) {
      progressBar.style.width = (video.currentTime / video.duration * 100) + '%';
      timeDisplay.textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration);
    }
  });

  // Buffer
  video.addEventListener('progress', () => {
    if (video.buffered.length && video.duration) {
      progressBuffered.style.width = (video.buffered.end(video.buffered.length - 1) / video.duration * 100) + '%';
    }
  });

  // Seek
  progressContainer.addEventListener('click', e => {
    const rect = progressContainer.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    if (video.duration) video.currentTime = pct * video.duration;
  });

  // Skip
  document.getElementById('btnSkipBack').addEventListener('click', () => { video.currentTime = Math.max(0, video.currentTime - 10); });
  document.getElementById('btnSkipFwd').addEventListener('click', () => { video.currentTime += 10; });

  // Volume
  document.getElementById('btnMute').addEventListener('click', () => {
    video.muted = !video.muted;
    document.getElementById('iconVol').style.display = video.muted ? 'none' : '';
    document.getElementById('iconMute').style.display = video.muted ? '' : 'none';
  });
  volumeSlider.addEventListener('input', () => { video.volume = volumeSlider.value; });

  // Fullscreen
  document.getElementById('btnFullscreen').addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else playerWrapper.requestFullscreen();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    switch(e.key) {
      case ' ': e.preventDefault(); togglePlay(); break;
      case 'ArrowLeft': video.currentTime = Math.max(0, video.currentTime - 5); break;
      case 'ArrowRight': video.currentTime += 5; break;
      case 'ArrowUp': e.preventDefault(); video.volume = Math.min(1, video.volume + 0.1); volumeSlider.value = video.volume; break;
      case 'ArrowDown': e.preventDefault(); video.volume = Math.max(0, video.volume - 0.1); volumeSlider.value = video.volume; break;
      case 'f': document.getElementById('btnFullscreen').click(); break;
      case 'm': document.getElementById('btnMute').click(); break;
    }
  });

  // Dropdown toggles
  document.getElementById('btnQuality').addEventListener('click', e => {
    e.stopPropagation();
    qualityMenu.classList.toggle('open');
    downloadMenu.classList.remove('open');
  });
  document.getElementById('btnDownload').addEventListener('click', e => {
    e.stopPropagation();
    downloadMenu.classList.toggle('open');
    qualityMenu.classList.remove('open');
  });
  document.addEventListener('click', () => {
    qualityMenu.classList.remove('open');
    downloadMenu.classList.remove('open');
  });

  // ========= QUALITY & DOWNLOADS =========

  function buildQualityMenu() {
    qualityList.innerHTML = '';
    downloadList.innerHTML = '';
    downloadGrid.innerHTML = '';

    if (!hls || !hls.levels || hls.levels.length === 0) return;

    // Auto option
    const autoItem = document.createElement('div');
    autoItem.className = 'menu-item' + (currentQuality === -1 ? ' active' : '');
    autoItem.innerHTML = `<span class="check">${currentQuality === -1 ? '●' : ''}</span> Auto`;
    autoItem.addEventListener('click', () => { hls.currentLevel = -1; currentQuality = -1; buildQualityMenu(); qualityMenu.classList.remove('open'); });
    qualityList.appendChild(autoItem);

    hls.levels.forEach((level, i) => {
      const h = level.height || '?';
      const label = h + 'p';
      const bitrate = level.bitrate ? (level.bitrate / 1000).toFixed(0) + ' kbps' : '';

      // Quality menu item
      const item = document.createElement('div');
      item.className = 'menu-item' + (currentQuality === i ? ' active' : '');
      item.innerHTML = `<span class="check">${currentQuality === i ? '●' : ''}</span> ${label} <span style="color:var(--text-muted);font-size:11px;margin-left:auto">${bitrate}</span>`;
      item.addEventListener('click', () => { hls.currentLevel = i; currentQuality = i; buildQualityMenu(); qualityMenu.classList.remove('open'); });
      qualityList.appendChild(item);

      // Download menu item (in player dropdown)
      const dlItem = document.createElement('a');
      dlItem.className = 'menu-item';
      dlItem.href = level.url[0];
      dlItem.target = '_blank';
      dlItem.innerHTML = `<span>⬇</span> Download ${label}`;
      downloadList.appendChild(dlItem);

      // Download grid item (below player)
      const dlCard = document.createElement('a');
      dlCard.className = 'download-link';
      dlCard.href = level.url[0];
      dlCard.target = '_blank';
      dlCard.innerHTML = `<span class="dl-quality">${label}</span><span style="color:var(--text-muted);font-size:11px">${bitrate}</span><span class="dl-icon">⬇</span>`;
      downloadGrid.appendChild(dlCard);
    });

    downloadPanel.classList.add('visible');
  }

  // ========= STREAM PLAYBACK =========

  function destroyPlayer() {
    if (hls) { hls.destroy(); hls = null; }
    video.removeAttribute('src');
    video.load();
    playerWrapper.classList.remove('visible');
    downloadPanel.classList.remove('visible');
    currentQuality = -1;
  }

  function playStream(server, streamData) {
    if (activeServer === server) return;
    activeServer = server;

    // Update tabs
    tabs.forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${server}`).classList.add('active');
    statusDiv.textContent = `Now playing: ${server}`;

    destroyPlayer();

    let streamUrl = streamData.streamUrl;
    if (streamData.encryptedStream) streamUrl = decryptURL(streamData.encryptedStream);
    const proxyUrl = "/proxy?url=" + encodeURIComponent(streamUrl) + "&server=" + server + "&apiKey=" + window.API_KEY_PAYLOAD;

    // Subtitles
    while (video.firstChild) video.removeChild(video.firstChild);
    if (streamData.subtitleUrl) {
      const track = document.createElement('track');
      track.kind = 'captions';
      track.label = 'Subtitles';
      track.srclang = 'en';
      track.src = streamData.subtitleUrl;
      track.default = true;
      video.appendChild(track);
    }

    playerWrapper.classList.add('visible');
    playerWrapper.classList.add('paused');

    if (streamUrl.includes('.mp4')) {
      video.src = proxyUrl;
      video.play();
      video.onerror = () => { statusDiv.textContent = `❌ Failed to play ${server} (native error)`; };
    } else if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(proxyUrl);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play();
        buildQualityMenu();
      });

      hls.on(Hls.Events.LEVEL_SWITCHED, () => { buildQualityMenu(); });

      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          statusDiv.textContent = `❌ Failed to play ${server} (${data.type}: ${data.details})`;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            if (data.details === 'manifestLoadError' && data.response && data.response.code >= 400) {
              retryCounts[server] = (retryCounts[server] || 0) + 1;
              if (retryCounts[server] <= 1) {
                statusDiv.textContent = `🔄 Link expired for ${server}. Refetching...`;
                hls.destroy();
                setTimeout(() => fetchSingleServer(server, true), 500);
              } else {
                statusDiv.textContent = `❌ ${server} upstream is down`;
                hls.destroy();
              }
            } else {
              hls.destroy();
            }
          } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
          } else {
            hls.destroy();
          }
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = proxyUrl;
      video.play();
    }
  }

  // ========= SERVER FETCH =========

  const mediaTypeSelect = document.getElementById('mediaType');
  const tvInputs = document.getElementById('tvInputs');
  mediaTypeSelect.addEventListener('change', () => {
    tvInputs.style.display = mediaTypeSelect.value === 'tv' ? 'flex' : 'none';
  });

  // Advanced toggle
  document.getElementById('advToggle').addEventListener('click', () => {
    document.getElementById('advPanel').classList.toggle('open');
  });

  function setTabStatus(server, state, label) {
    const tab = document.getElementById(`tab-${server}`);
    tab.className = 'server-tab ' + state;
    tab.querySelector('.tab-status').textContent = label;
  }

  function fetchSingleServer(server, forceAutoPlay = false) {
    const tmdbId = document.getElementById('tmdbId').value.trim();
    const type = mediaTypeSelect.value;
    const season = document.getElementById('season').value.trim() || '1';
    const episode = document.getElementById('episode').value.trim() || '1';
    const advServer = document.getElementById('advServer').value;
    const advLang = document.getElementById('advLang').value;
    const advSub = document.getElementById('advSub').value;
    const advOneServer = document.getElementById('advOneServer').checked;

    setTabStatus(server, 'loading', '⏳ Fetching...');

    let apiUrl = `/api/extract?tmdbId=${tmdbId}&server=${server}&nocache=true`;
    if (type === 'tv') apiUrl += `&type=tv&s=${season}&e=${episode}`;
    if (server === 'nxsha') {
      if (advServer) apiUrl += `&advServer=${advServer}`;
      if (advLang) apiUrl += `&advLang=${advLang}`;
      if (advSub) apiUrl += `&advSub=${advSub}`;
      if (advOneServer) apiUrl += `&advOneServer=true`;
    }

    fetch(apiUrl, { headers: { 'x-api-key': window.API_KEY_PAYLOAD } })
      .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); })
      .then(data => {
        if (data.streamUrl || data.iframeUrl || data.encryptedStream) {
          serverStreams[server] = data;
          setTabStatus(server, 'ready', '✅ Ready');
          if (!activeServer || forceAutoPlay) playStream(server, data);
        } else {
          setTabStatus(server, 'failed', '❌ No stream');
        }
      })
      .catch(() => { setTabStatus(server, 'failed', '❌ Error'); });
  }

  extractBtn.addEventListener('click', () => {
    const tmdbId = document.getElementById('tmdbId').value.trim();
    if (!tmdbId) { alert("Enter a TMDB ID first!"); return; }

    extractBtn.disabled = true;
    activeServer = null;
    serverStreams = {};
    retryCounts = {};
    destroyPlayer();
    statusDiv.textContent = 'Fetching all servers...';

    const servers = ['vidsrc', 'cinema', 'vidlink', 'nxsha', 'fmovies'];
    servers.forEach((s, i) => {
      setTabStatus(s, '', '—');
      setTimeout(() => fetchSingleServer(s), i * 2000);
    });

    setTimeout(() => extractBtn.disabled = false, 2000);
  });
</script>

</body>
